<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hacker Clicker</title>
</head>
<body id="page" style="font-family: monospace; text-align: center; padding-top: 60px; background-color: #0d1117; color: #00ff41;">

  <h1>🔐 HACKER CLICKER 🔐</h1>
  <p style="color: #4caf50;">[ TARGET: FIREWALL v9.2 — CLICK TO BREACH ]</p>

  <!-- The clickable "hack" button — each click is one intrusion attempt -->
  <button id="hackBtn" style="font-size: 4rem; background: none; border: none; cursor: pointer;">💻</button>

  <!-- Counter display — shows total intrusion attempts, starts at 0 -->
  <div id="counter" style="font-size: 2rem; margin-top: 20px;">0</div>

  <!-- Message area — shows breach progress at milestones -->
  <div id="message" style="font-size: 1.1rem; margin-top: 15px; color: #4caf50;">> awaiting input_</div>

  <script>
    // Select the three elements the app needs using their ids
    const hackBtn = document.getElementById("hackBtn");
    const counter = document.getElementById("counter");
    const message = document.getElementById("message");
    const page = document.getElementById("page");

    // clicks tracks total intrusion attempts — starts at 0
    let clicks = 0;

    // addEventListener watches the button; the callback runs once per click
    hackBtn.addEventListener("click", function () {

      // Increase the counter and sync the on-screen number
      clicks++;
      counter.textContent = clicks;

      // Milestones checked HIGHEST to LOWEST so the biggest reached
      // milestone always wins. Each stage changes the background color
      // to show the "breach" getting deeper.
      if (clicks >= 100) {
        message.textContent = "> ROOT ACCESS GRANTED. You win! Maybe take a break 🏆";
        page.style.backgroundColor = "#001a00";       // deep green — full breach
        hackBtn.textContent = "🔓";                    // TWIST: the lock opens!
      } else if (clicks >= 50) {
        message.textContent = "> firewall integrity at 12%... admin has been paged 😅";
        page.style.backgroundColor = "#1a0d00";       // dark orange — alarms going off
      } else if (clicks >= 25) {
        message.textContent = "> encryption cracked. accessing mainframe... 🤯";
        page.style.backgroundColor = "#0d0d1a";       // dark blue — deeper in
      } else if (clicks >= 10) {
        message.textContent = "> port scan complete. vulnerability found 🔥";
        page.style.backgroundColor = "#0d1a17";       // subtle green shift
      }
    });
  </script>
<!-- https://github.com/47jmerchant/cs81-module8-clicker -->
</body>
</html>
